name: Mobile release

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

jobs:
  eas-build:
    name: EAS iOS and Android
    if: ${{ vars.EXPO_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start EAS builds
        run: pnpm --filter @michelin/mobile exec eas build --platform all --profile "${{ inputs.profile }}" --non-interactive
        env:
          EXPO_PROJECT_ID: ${{ vars.EXPO_PROJECT_ID }}
