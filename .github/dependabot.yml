version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      javascript:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: monthly
