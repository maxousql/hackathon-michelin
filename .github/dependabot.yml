version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      javascript:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      # Expo SDK controls these versions. Upgrade them together with Expo.
      - dependency-name: react
        versions:
          - '>19.2.3'
      - dependency-name: react-dom
        versions:
          - '>19.2.3'
      - dependency-name: react-native
        versions:
          - '>0.85.3'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: monthly
    ignore:
      - dependency-name: node
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: monthly
    ignore:
      - dependency-name: node
        update-types:
          - version-update:semver-major
